name: Postman Collection Run
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    name: Run Identity Tests
    steps:
      - uses: actions/checkout@v4

      - name: Install and Run Postman Tests
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          curl -o- "https://dl-cli.pstmn.io/install.sh" | sh
          export PATH="$HOME/.local/share/postman-cli:$PATH"
          postman login --with-api-key "$POSTMAN_API_KEY"
          postman collection run "52238111-069140b6-d9fb-4d30-98e6-c8f3ee02697e" \
            --environment "52983738-dcfc279b-4e55-4895-baf9-2fe70d716f8f" \
            --verbose